apiVersion: apps/v1
kind: Deployment
metadata:
  name: safety-net-backend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: safety-net-backend

  template:
    metadata:
      labels:
        app: safety-net-backend

    spec:
      containers:
        - name: backend
          image: kadv19/safety-net-backend:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
